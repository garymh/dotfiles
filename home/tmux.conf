set -g default-terminal "xterm-kitty"
set -ag terminal-overrides ",xterm-kitty:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

unbind C-b
set -g prefix C-space
set -g mouse on
set -w -g main-pane-width 85
set -g base-index 1
set -g pane-base-index 1
set -g allow-rename on
set -g automatic-rename on
set -g set-titles on
set -g history-limit 10000
set-option -w -g wrap-search off

bind B {
  copy-mode
  send -X clear-selection
  send -X start-of-line
  send -X start-of-line
  send -X cursor-up
  send -X start-of-line
  send -X start-of-line

  if -F "#{m:*❯ *,#{copy_cursor_line}}" {
    send -X search-forward-text "❯ "
    send -X stop-selection
    send -X -N 2 cursor-right
    send -X begin-selection
    send -X end-of-line
    send -X end-of-line
    if "#{m:*❯ ?*,#{copy_cursor_line}}" {
      send -X cursor-left
    }
  } {
    send -X end-of-line
    send -X end-of-line
    send -X begin-selection
    send -X search-backward-text "❯ "
    send -X end-of-line
    send -X end-of-line
    send -X cursor-right
    send -X stop-selection
  }
}

# Search back to last prompt (mnemonic: "[b]ack").
# @wincent is so clever!
bind-key b copy-mode\; send-keys -X start-of-line\; send-keys -X search-backward "❯"\; send-keys -X next-word

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'L' send -X end-of-line
bind-key -T copy-mode-vi 'H' send -X start-of-line
bind-key -T copy-mode-vi '}' send -X halfpage-down
bind-key -T copy-mode-vi '{' send -X halfpage-up
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle \; send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel

bind-key -r < swap-window -t -
bind-key -r > swap-window -t +

# Intuitive window-splitting keys.
bind '|' split-window -h -c '#{pane_current_path}' # normally prefix-%
bind '\' split-window -h -c '#{pane_current_path}' # normally prefix-%
bind '-' split-window -v -c '#{pane_current_path}' # normally prefix-"

set -sg escape-time 0
bind-key x kill-pane

unbind c
bind c new-window -c '#{pane_current_path}'
unbind '"'
bind '"' split-window -v -c '#{pane_current_path}'
unbind Left
bind -r Left resize-pane -L 5
unbind Right
bind -r Right resize-pane -R 5
unbind Down
bind -r Down resize-pane -D 5
unbind Up
bind -r Up resize-pane -U 5

bind 8 resize-pane -x 88

unbind S-Left
bind -n S-Left  previous-window
unbind S-Right
bind -n S-Right next-window

bind C-e new-window -n 'tmux.conf' "sh -c '\${VISUAL:-nvim} ~/.tmux.conf && tmux source ~/.tmux.conf && tmux display \"Config reloaded\"'"
bind C-r source-file ~/.tmux.conf \; display "Config reloaded"
bind -r Tab last-window # cycle thru MRU tabs
bind C-s if -F '#{s/off//:status}' 'set status off' 'set status on'
bind -r a select-pane -t .+1 \;  resize-pane -Z

# set -g default-terminal "alacritty"
# set -ag terminal-overrides ",alacritty:Tc"
# set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
# set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

FOREGROUND="#2B60A7"
FOREGROUND_LIGHT="#7D96D1"
DARKEST="#2C2C31"
DARKER="#494A52"
BACKGROUND="#404049"
FOREGROUND_LIGHT_TEXT="#000000"
ACTIVE_FOREGROUND_LIGHT_TEXT="#ffffff"
LIGHT="#57575e"
LIGHTER="#787882"
LIGHTEST="#9A9BA6"
FIRST_GRADIENT="#4d6691"
SECOND_GRADIENT="#6582b9"
THIRD_GRADIENT="#7698d6"

set -g status-bg "$BACKGROUND"
set -g status-fg "$FOREGROUND"

GRADIENT_UP="#[bg=$BACKGROUND] #[bg=$DARKER] #[bg=$DARKEST,fg=$ACTIVE_FOREGROUND_LIGHT_TEXT]"
GRADIENT_DOWN="#[bg=$DARKEST] #[bg=$DARKER] #[bg=$BACKGROUND]"
STATUS_GRADIENT_UP="#[bg=$LIGHT,fg=$FOREGROUND_LIGHT_TEXT]"
STATUS_GRADIENT_MID="#[bg=$LIGHTER] #[bg=$LIGHTEST,fg=$FOREGROUND_LIGHT_TEXT]"
STATUS_GRADIENT_DOWN="#[bg=$LIGHTER]"
ACTIVE_STATUS_GRADIENT_UP="#[bg=$FIRST_GRADIENT,fg=$ACTIVE_FOREGROUND_LIGHT_TEXT]"
ACTIVE_STATUS_GRADIENT_MID="#[bg=$SECOND_GRADIENT] #[bg=$THIRD_GRADIENT,fg=$ACTIVE_FOREGROUND_LIGHT_TEXT]"
ACTIVE_STATUS_GRADIENT_DOWN="#[bg=$FIRST_GRADIENT]"

set -g status-interval 60
set -g status-right-length 50
set -g status-justify left
set -g status-position top

set -g status-left "#[bg=$FOREGROUND] $GRADIENT_UP  $GRADIENT_DOWN "
set -g status-right "#{prefix_highlight} $GRADIENT_UP #(battery -p -t)$GRADIENT_DOWN$GRADIENT_UP#(date '+ %l:%M')$GRADIENT_DOWN #[bg=$FOREGROUND] "

set-window-option -g window-status-format "$STATUS_GRADIENT_UP #I $STATUS_GRADIENT_MID#{?#W, #W, #{pane_current_command}} $STATUS_GRADIENT_DOWN "
set-window-option -g window-status-current-format "$ACTIVE_STATUS_GRADIENT_UP #I $ACTIVE_STATUS_GRADIENT_MID#{?#W, #W, #{pane_current_command}} $ACTIVE_STATUS_GRADIENT_DOWN "

set -g focus-events on

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-prefix-highlight"
set -g @plugin "nhdaly/tmux-better-mouse-mode"
set -g @plugin "tmux-plugins/tmux-pain-control"
set -g @plugin "tmux-plugins/tmux-yank"

set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'open {}'
set -g @thumbs-contrast 1
set -g @thumbs-key f
set -g @plugin 'fcsonline/tmux-thumbs'

if "test ! -d ~/.tmux/plugins/tpm" \
           "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

           run '~/.tmux/plugins/tpm/tpm'

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'M-c' if-shell "$is_vim" 'send-keys M-c' 'select-pane -t:.-'
bind-key -n 'M-d' if-shell "$is_vim" 'send-keys M-d' 'select-pane -t:.+'

bind -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 1'
bind -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 1'
bind -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 1'
bind -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 1'

bind-key -T copy-mode-vi M-h resize-pane -L 1
bind-key -T copy-mode-vi M-j resize-pane -D 1
bind-key -T copy-mode-vi M-k resize-pane -U 1
bind-key -T copy-mode-vi M-l resize-pane -R 1
