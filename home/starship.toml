format = """
$username\
$hostname\
$git_branch\
$git_commit\
$git_state\
$git_status\
$golang\
$ruby\
$nix_shell\
$env_var\
$cmd_duration\
${custom.gitlab}\
${custom.gitlab-cli}\
$line_break\
$lua\
$jobs\
$battery\
$time\
${custom.sudo}\
$status\
$character\
$status\
"""

right_format = """
    $directory\
${custom.dir}\
    ${custom.home_dir}\
"""
# format	link	Configure the format of the prompt.
# right_format	""	See Enable Right Prompt
# scan_timeout	30	Timeout for starship to scan files (in milliseconds).
# command_timeout	500	Timeout for commands executed by starship (in milliseconds).
# add_newline	true	Inserts blank line between shell prompts.
# #
# scan_timeout = 30
# command_timeout = 500
# add_newline = true
# # divider = "-"

[custom.home_dir]
command = "echo  "
when = '[ "$PWD" == "$HOME" ]'
shell = ["bash","--norc","--noprofile"]
style = "fg:bright-white bg:#1F2335"
format = "[ $output ]($style) "

[custom.dir]
command = "echo  "
when = '[ "$PWD" != "$HOME" ]'
shell = ["bash","--norc","--noprofile"]
style = "fg:blue bg:#1F2335"
format = "[ $output ]($style) "


[character]
format = '$symbol '
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vicmd_symbol = '[❮](bold green)'
disabled = false

[custom.sudo]
description = "valid sudo timestamp marker"
command = "echo -n '!'"
format = "[$symbol$output]($style) "
style = "bold fg:bright-red"
when = "sudo -vn &>/dev/null"

[cmd_duration]
min_time = 2000
format = 'took [$duration]($style) '
style = 'yellow bold'
show_milliseconds = false
disabled = false
show_notifications = false
min_time_to_notify = 45000

[directory]
style = "bg:#4F6591"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
# truncation_length = 3
# format = "[ $path ]($style)[$read_only]($read_only_style) "
# style = "fg:white bg:black bold"
# read_only = "  "
# read_only_style = "fg:black bg:red"
# folder_style = "fg:blue bg:black"

[directory.substitutions]
"gitlab" = " "
"cli" = ""

[env_var]
symbol = ''
style = 'black bold dimmed'
format = 'with [$env_value]($style) '
disabled = false

[git_branch]
format = '[$symbol$branch]($style)(:[$remote]($style)) '
symbol = ' '
style = 'bold purple'
truncation_length = 15
truncation_symbol = '…'
only_attached = false
always_show_remote = false
disabled = false

[git_commit]
commit_hash_length = 7
format = '[\($hash$tag\)]($style) '
style = 'green bold'
only_detached = true
disabled = false
tag_symbol = '🏷  '
tag_disabled = true

[git_state]
rebase = 'REBASING'
merge = 'MERGING'
revert = 'REVERTING'
cherry_pick = 'CHERRY-PICKING'
bisect = 'BISECTING'
am = 'AM'
am_or_rebase = 'AM/REBASE'
style = 'bold yellow'
format = '\([$state( $progress_current/$progress_total)]($style)\) '
disabled = false

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = 'red bold'
stashed = '\$'
ahead = '⇡'
behind = '⇣'
diverged = '⇕'
conflicted = '='
deleted = '✘'
ignore_submodules = true
renamed = '»'
modified = '!'
staged = '+'
untracked = ''
disabled = false

[golang]
format = '∙ [$symbol($version )]($style)'
version_format = '${raw}'
symbol = ' '
style = 'bold cyan'
disabled = false
detect_extensions = ['go']
detect_files = [
        'go.mod',
        'go.sum',
        'glide.yaml',
        'Gopkg.yml',
        'Gopkg.lock',
        '.go-version',
]
detect_folders = ['Godeps']

[hostname]
ssh_only = true
trim_at = '.'
format = '[$hostname]($style) in '
style = 'green dimmed bold'
disabled = false

[jobs]
threshold = 1
format = '[$symbol$number]($style) '
symbol = '✦'
style = 'bold blue'
disabled = false

[lua]
format = '∙ [$symbol($version )]($style)'
version_format = 'v${raw}'
symbol = '🌙 '
style = 'bold blue'
lua_binary = 'lua'
disabled = false
detect_extensions = ['lua']
detect_files = ['.lua-version']
detect_folders = ['lua']

[nix_shell]
format = '∙ [$symbol$state( \($name\))]($style) '
symbol = ' '
style = 'bold blue'
impure_msg = 'impure'
pure_msg = 'pure'
disabled = false

[ruby]
format = '∙ [$symbol($version )]($style)'
version_format = '${raw}'
symbol = ' '
style = 'bold red'
disabled = true
detect_extensions = ['rb']
detect_files = [
        'Gemfile',
        '.ruby-version',
]
detect_folders = []

[shell]
format = '$indicator '
bash_indicator = 'bsh'
fish_indicator = 'fsh'
zsh_indicator = 'zsh'
powershell_indicator = 'psh'
ion_indicator = 'ion'
elvish_indicator = 'esh'
tcsh_indicator = 'tsh'
unknown_indicator = ''
disabled = true

[status]
format = '[$symbol$status]($style) '
symbol = '✖'
not_executable_symbol = '🚫'
not_found_symbol = '🔍'
sigint_symbol = '🧱'
signal_symbol = '⚡'
style = 'bold red'
map_symbol = false
recognize_signal_code = true
disabled = true

[time]
format = 'at [$time]($style) '
style = 'bold yellow'
use_12hr = false
disabled = true
utc_time_offset = 'local'
time_range = '-'

[username]
format = '[$user]($style) in '
style_root = 'red bold'
style_user = 'yellow bold'
show_always = false
disabled = false

[custom.docker]
description = "Shows the docker symbol if the current directory has Dockerfile or docker-compose.yml files"
command = "echo 🐳"
files = ["Dockerfile", "docker-compose.yml", "docker-compose.yaml"]
when = """ command -v docker &> /dev/null; exit (echo $?); """
format = '∙ ($output) '
disabled = true

[custom.gitlab-cli]
command = "~/.zsh/bin/glnumbers"
description = "Show current GitLab CLI references"
symbol = ""
when = '[[ -f bin/glab ]] && ~/.zsh/bin/glnumbers'
style = "bg:#7759C2 fg:#FCA326"
disabled = false
format = '[ $symbol  ($output) ]($style)'

[custom.gitlab]
command = "~/.zsh/bin/glnumbers"
description = "Show current GitLab references"
symbol = ""
when = "[[ -f GITALY_SERVER_VERSION ]] && ~/.zsh/bin/glnumbers"
style = "bg:#7759C2 fg:#FCA326"
disabled = false
format = '[ $symbol  ($output) ]($style)'
