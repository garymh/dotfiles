# vim:fileencoding=utf-8:foldmethod=marker

# disable_ligatures always

font_family      FixedsysModernV05 Nerd Font Mono
bold_font        FixedsysModernV05 Nerd Font Mono
italic_font      FixedsysModernV05 Nerd Font Mono
bold_italic_font FixedsysModernV05 Nerd Font Mono
adjust_line_height  1
adjust_column_width 1
macos_thicken_font 0.00

# font_family      IntelOne Mono Regular
# bold_font        IntelOne Mono Bold
# italic_font      IntelOne Mono Light Italic
# bold_italic_font IntelOne Mono Bold Italic
# adjust_line_height  0
# adjust_column_width 0
# macos_thicken_font 0.90

modify_font underline_position 4
modify_font underline_thickness 200%
modify_font strikethrough_position 2px

undercurl_style thick-dense

font_size 18.0

# startup_session ~/.config/kitty/kitty-startup.session

symbol_map U+f101-U+f208 nonicons

cursor_beam_thickness 3
cursor_underline_thickness 3
cursor_blink_interval 0

strip_trailing_spaces smart
enable_audio_bell no
window_margin_width 0 10 0 10
window_padding_width 0 10 0 10

tab_bar_style powerline
tab_bar_align left
tab_powerline_style round
tab_bar_margin_width 15.0
tab_bar_edge top

dynamic_background_opacity yes

allow_remote_control socket-only

macos_option_as_alt yes
macos_traditional_fullscreen yes
macos_custom_beam_cursor yes

map ctrl+space>, set_tab_title
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}:{'🇿' if layout_name == 'stack' and num_windows > 1 else ''}{title}"

map alt+left send_text all \x1b\x62
map alt+right send_text all \x1b\x66

map alt+backspace send_text all \x17
map alt+shift+super+right launch --title "lazygit overlay" --type=overlay-main --copy-env lazygit
map alt+shift+super+up launch --title "btop overlay" --type=overlay screen -d -RR top btop

map ctrl+down kitten pass_keys.py neighboring_window bottom ctrl+j
map ctrl+left kitten pass_keys.py neighboring_window left   ctrl+h
map ctrl+right kitten pass_keys.py neighboring_window right  ctrl+l
map ctrl+up kitten pass_keys.py neighboring_window top    ctrl+k

map ctrl+shift+p send_text all \x1b[80;5u
map ctrl+shift+w send_text all \x1b[87;5u

map ctrl+space>/      launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
map ctrl+space>p kitten hints --type path --program @
map ctrl+space>s kitten hints --type hash --program @
map ctrl+space>shift+p kitten hints --type path --program -
map ctrl+space>shift+s kitten hints --type hash --program -
map ctrl+space>t kitten themes
map ctrl+space>u kitten hints
map ctrl+space>v kitten hints --type=path --program "launch --type=tab nvim"
map ctrl+space>z kitten zoom_toggle.py

map shift+down move_window down
map shift+left move_window left
map shift+right move_window right
map shift+up move_window up

map shift+super+= layout_action rotate
map shift+super+f send_text all \x1bf
map shift+super+n new_os_window_with_cwd
map shift+super+r start_resizing_window
map shift+super+w close_os_window

map super+backspace send_text all \x1bw
map super+d launch --location=hsplit --cwd=last_reported
map super+k send_text all \x1bk
map super+n new_tab_with_cwd
map super+o send_text all \x1bo
map super+p send_text all \x1bp
map super+r combine : load_config_file : launch --type=overlay --hold --allow-remote-control kitty @ send-text "kitty config reloaded"

map super+left send_text all \x01
map super+left_bracket kitten pass_keys.py neighboring_window prev ctrl+8
map super+right send_text all \x05
map super+right_bracket kitten pass_keys.py neighboring_window next ctrl+9

map super+shift+d launch --location=vsplit --cwd=last_reported
map super+shift+k send_text all \x1b[107;6u
map super+shift+left_bracket prev_tab
map super+shift+right_bracket next_tab

map super+t new_tab_with_cwd
map super+w close_window
map super+z pipe @ansi_alternate_scrollback os_window less +G -R

# http://aperiodic.net/phil/archives/Geekery/term-function-keys.html

enabled_layouts splits

# BEGIN_KITTY_THEME
# zenbones_dark
include current-theme.conf
# END_KITTY_THEME
