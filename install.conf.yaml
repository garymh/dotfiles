- defaults:
    clean:
      force: true
    link:
      create: true
      relink: true
      force: true
    brewfile:
      stdout: true
    brew:
      stderr: true
      stdout: true

- sudo:
    - shell:
        - ["chmod 600 ~/.ssh/id_ed25519", Fixing permissions (1/2)]
        - ["chmod 600 ~/.ssh/id_ed25519.pub", Fixing permissions (2/2)]

- clean: ["~", "~/.config"]

- link:
    ~/.ctags: home/ctags
    ~/.rgignore: home/agignore
    ~/.fdignore: home/agignore
    ~/.batconfig: home/batconfig
    ~/.ignore: home/agignore
    ~/.gemrc: home/gemrc
    ~/.default-gems: home/default-gems
    ~/.irbrc: home/irbrc
    ~/.gitconfig: home/gitconfig
    ~/.bundle/config: home/bundle_config
    ~/.gitignore_global: home/gitignore_global
    ~/.gitmessage: home/gitmessage
    ~/.rspec: home/rspec
    ~/.tidyrc: home/tidyrc
    ~/.vale.ini: home/vale.ini
    ~/.config/nvim/init.lua: home/vim/init.lua
    ~/.zprofile: home/zprofile
    ~/.zshrc: home/zshrc
    ~/.zimrc: home/zimrc
    ~/.zsh: home/zsh/
    ~/.mackup: home/mackup

    ~/.config/lazygit/config.yml: home/lazygit.yml
    ~/.config/alacritty/alacritty.toml: home/alacritty.toml
    ~/.config/atuin/config.toml: home/atuin.toml
    ~/.config/lsd/config.yaml: home/lsd.yaml
    ~/.config/bob/config.json: home/bob.json
    ~/.config/btop/btop.conf: home/btop.conf
    ~/.config/neovide/config.toml: home/neovide.toml
    ~/.config/starship.toml: home/starship.toml
    ~/.config/ripgrep/config: home/ripgreprc
    ~/.config/ghostty/config: home/ghostty
    ~/.config/luaformatter/config.yaml: home/luaformatter.yaml
    ~/.config/nvim/autoload: home/vim/autoload/
    ~/.config/nvim/ftdetect: home/vim/ftdetect/
    ~/.config/nvim/ftplugin: home/vim/ftplugin/
    ~/.config/nvim/after: home/vim/after/
    ~/.config/nvim/lua: home/vim/lua/
    ~/.config/nvim/lsp: home/vim/lsp/
    ~/.config/nvim/spell: home/vim/spell/
    ~/.config/nvim/snippets: home/vim/snippets/

    ~/iCloud:
      path: "~/Library/Mobile Documents/com~apple~CloudDocs"
      if: "[ `uname` = Darwin ]"
    ~/.zsh/private:
      path: ~/iCloud/Internal/private
      if: "[ `uname` = Darwin ]"
    ~/.ssh:
      path: home/zsh/private/ssh/
      if: "[ `uname` = Darwin ]"
    ~/.gnupg:
      path: home/zsh/private/gnupg/
      if: "[ `uname` = Darwin ]"
    ~/.hammerspoon:
      path: home/hammerspoon/
      if: "[ `uname` = Darwin ]"
    ~/.hammerspoon/watchers/screens.lua:
      path: ~/iCloud/Internal/custom/screens.lua
      if: "[ `uname` = Darwin ]"
    ~/.config/karabiner.edn:
      path: home/karabiner.edn
      if: "[ `uname` = Darwin ]"
    ~/.gitconfig.local:
      path: home/zsh/private/gitconfig.local
      if: "[ `uname` = Darwin ]"
    ~/.agents:
      path: home/zsh/private/agents/
      if: "[ `uname` = Darwin ]"
    ~/.claude:
      path: home/zsh/private/claude/
      if: "[ `uname` = Darwin ]"
    ~/.config/opencode:
      path: home/zsh/private/opencode/
      if: "[ `uname` = Darwin ]"

- install-brew: true

- brewfile:
    - Brewfile

- shell:
    - ["touch ~/.hushlogin", "Hushing login"]
    - ["touch ~/.rm_recycle", "Enabling recycling"]
    - ["./scripts/macos/dockutil_init.sh", "Fixing up Dock"]
    - ["./scripts/macos/hide_folders.sh", "Hiding macos folders"]

- duti:
    file: scripts/macos/Dutifile
